<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Espace Utilisateur</title>
    <style>
        /* Style global */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0fdf4; /* vert très clair */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Conteneur central */
        .container {
            max-width: 600px;
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        /* Titre principal */
        h2 {
            color: #059669; /* vert vif */
            margin-bottom: 15px;
        }

        /* Texte descriptif */
        p {
            color: #4b5563; /* gris foncé */
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* Boutons */
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        /* Bouton retour accueil */
        .btn-home {
            background: #2563eb; /* bleu */
            color: white;
        }

        .btn-home:hover {
            background: #1d4ed8;
        }

        /* Bouton déconnexion */
        .btn-logout {
            background: #ef4444; /* rouge */
            color: white;
        }

        .btn-logout:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Titre -->
    <h2>Espace Utilisateur</h2>

    <!-- Description -->
    <p>Cette page est accessible aux rôles <strong>USER</strong> et <strong>ADMIN</strong>.</p>

    <!-- Bouton retour à l'accueil -->
    <a class="btn btn-home" th:href="@{/home}">Retour à l'accueil</a>

    <!-- Formulaire de déconnexion -->
    <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-logout">Déconnexion</button>
    </form>
</div>
</body>
</html>
