<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fef9c3, #e0f2fe); /* jaune clair -> bleu clair */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Conteneur central */
        .container {
            width: 380px;
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
        }

        h2 {
            text-align: center;
            color: #2563eb; /* bleu vif */
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        label {
            display: block;
            margin-bottom: 6px;
            margin-top: 15px;
            font-weight: 600;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background-color: #10b981; /* vert */
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #059669;
        }

        /* Messages d'erreur ou de succès */
        .error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Connexion</h2>

    <!-- Message d'erreur si identifiants incorrects -->
    <p th:if="${param.error}" class="error">
        Échec de connexion, merci de vérifier vos identifiants.
    </p>

    <!-- Message de succès après déconnexion -->
    <p th:if="${param.logout}" class="success">
        Vous avez été déconnecté avec succès.
    </p>

    <!-- Formulaire de connexion -->
    <form th:action="@{/login}" method="post">
        <label for="username">Nom d'utilisateur</label>
        <input id="username" type="text" name="username" placeholder="Ex : admin" required>

        <label for="password">Mot de passe</label>
        <input id="password" type="password" name="password" placeholder="Saisir le mot de passe" required>

        <button type="submit">Se connecter</button>
    </form>
</div>
</body>
</html>
